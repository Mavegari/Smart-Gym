<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Gym AI | Tu entrenamiento a medida</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background-color: #2d2d2d; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 400px; }
        h2 { color: #00d4ff; text-align: center; }
        label { display: block; margin-top: 1rem; font-size: 0.9rem; color: #ccc; }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; border-radius: 5px; border: none; background: #3d3d3d; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin-top: 2rem; border: none; border-radius: 5px; background: #00d4ff; color: #1a1a1a; font-weight: bold; cursor: pointer; font-size: 1rem; }
        button:hover { background: #00b8e6; }
    </style>
</head>
<body>

<div class="container">
    <h2>⚡ Smart Gym AI</h2>
    <p style="text-align: center; font-size: 0.8rem;">Recibe tu rutina personalizada por IA</p>
    
    <form id="payment-form">
        <label>Nombre Completo</label>
        <input type="text" id="name" required placeholder="Tu nombre">

        <label>Email</label>
        <input type="email" id="email" required placeholder="tu@email.com">

        <label>¿Cuál es tu objetivo?</label>
        <select id="objetivo">
            <option value="perder_peso">Perder Peso</option>
            <option value="ganar_musculo">Ganar Músculo</option>
            <option value="resistencia">Resistencia / Cardio</option>
        </select>

        <label>Días de entreno por semana</label>
        <select id="frecuencia">
            <option value="2-3">2-3 días</option>
            <option value="4-5">4-5 días</option>
            <option value="diario">Diario</option>
        </select>

        <label>¿Lesiones o notas?</label>
        <textarea id="lesiones" rows="3" placeholder="Ej: Dolor de rodilla..."></textarea>

        <button type="submit" id="checkout-button">Pagar y Generar Plan</button>
    </form>
</div>
