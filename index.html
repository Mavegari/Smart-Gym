<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Gym AI | Inteligencia Artificial para tu Entrenamiento</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d4ff;
            --primary-hover: #00b8e6;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { font-size: 1.875rem; font-weight: 700; margin: 0; color: var(--primary); }
        .header p { color: var(--text-muted); margin-top: 0.5rem; }

        .form-group { margin-bottom: 1.25rem; }
        label { display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-muted); }
        
        input, select, textarea {
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid #334155;
            background-color: #0f172a;
            color: white;
            font-size: 1rem;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            ring: 2px solid var(--primary);
        }

        button {
            width: 100%;
            padding: 1rem;
            background-color: var(--primary);
            color: #0f172a;
            font-weight: 700;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button:hover { background-color: var(--primary-hover); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .loader {
            border: 3px solid #0f172a;
            border-top: 3px solid white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: none;
            margin-left: 10px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1>⚡ Smart Gym AI</h1>
        <p>Entrenamiento personalizado por IA</p>
    </div>
    
    <form id="gym-form">
        <div class="form-group">
            <label for="name">Nombre Completo</label>
            <input type="text" id="name" required placeholder="Nombre Completo">
        </div>

        <div class="form-group">
            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" required placeholder="tu@email.com">
        </div>

        <div class="form-group">
            <label for="goal">Objetivo Fitness</label>
            <select id="goal">
                <option value="perder_peso">Perder Peso / Definición</option>
                <option value="ganar_musculo">Ganar Masa Muscular</option>
                <option value="resistencia">Resistencia y Cardio</option>
            </select>
        </div>

        <div class="form-group">
            <label for="frequency">Frecuencia Semanal</label>
            <select id="frequency">
                <option value="2-3">2 a 3 días</option>
                <option value="4-5">4 a 5 días</option>
                <option value="diario">Entrenamiento Diario</option>
            </select>
        </div>

        <div class="form-group">
            <label for="notes">Lesiones o Notas Médicas</label>
            <textarea id="notes" rows="2" placeholder="Ej: Molestias en hombro izquierdo..."></textarea>
        </div>

        <button type="submit" id="submit-btn">
            <span>Pagar y Generar Plan</span>
            <div class="loader" id="loader"></div>
        </button>
    </form>
</div>

<script>
    const STRIPE_LINK = 'https://buy.stripe.com/test_3cI00i9v94fRe6D2sJ5AQ00';

    document.getElementById('gym-form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('submit-btn');
        const loader = document.getElementById('loader');
        const email = document.getElementById('email').value;

        // Feedback visual: Desactivar botón y mostrar carga
        btn.disabled = true;
        loader.style.display = 'inline-block';
        btn.querySelector('span').innerText = 'Redirigiendo...';

        // Lógica de redirección profesional
        // Pasamos el email para mejorar la conversión (UX)
        setTimeout(() => {
            window.location.href = `${STRIPE_LINK}?prefilled_email=${encodeURIComponent(email)}`;
        }, 800);
    });
</script>

</body>
</html>
